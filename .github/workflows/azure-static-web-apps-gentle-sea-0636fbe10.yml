name: Azure Static Web Apps CI/CD

on:
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-22.04
    name: Build and Deploy Job

    steps:
      # ✅ Checkout
      - name: Checkout repository
        uses: actions/checkout@v3

      # ✅ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ✅ Cache frontend dependencies
      - name: Cache frontend node modules
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      # ✅ Cache API dependencies
      - name: Cache API node modules
        uses: actions/cache@v3
        with:
          path: api/node_modules
          key: ${{ runner.os }}-api-${{ hashFiles('api/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-api-

      # ✅ Install frontend
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      # ✅ Build frontend
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # ✅ Install API (NO BUILD needed usually)
      - name: Install API dependencies
        working-directory: ./api
        run: npm install

      # ✅ Deploy (skip frontend build only)
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_FOREST_03DF5981E }}
          action: "upload"
          app_location: "./frontend"
          api_location: "./api"
          output_location: "dist"
          skip_app_build: true
